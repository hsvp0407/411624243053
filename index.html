<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Project</title>

  <!-- Link to external CSS file -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== NAVIGATION BAR ===== -->
  <!-- Mobile: vertical stack | Desktop: horizontal row -->
  <nav class="navbar">
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </nav>

  <!-- ===== MAIN CONTENT WRAPPER ===== -->
  <main class="container">

    <!-- 1. Heading -->
    <h1>Welcome to My Website</h1>

    <!-- 2. Image with rounded edges -->
    <!-- Replace the src with your own image URL or file -->
    <img
      src="https://picsum.photos/400/250"
      alt="Sample Image"
      class="rounded-img"
    />

    <!-- 3. Video (width = 50vw) -->
    <!-- Replace src with your own video file -->
    <video class="my-video" controls>
      <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4"/>
      Your browser does not support the video tag.
    </video>

    <!-- 4. Table with 3 rows and 3 columns -->
    <table class="my-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Column A</th>
          <th>Column B</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <th>1</th>
          <td>vaishu</td>
          <td>vaishu</td>
        </tr>
        <tr>
          <th>2</th>
          <td>sumathi</td>
          <td>sumathi</td>
        </tr>
        <tr>
          <th>3</th>
          <td>prajeeth</td>
          <td>prajeeth</td>
        </tr>
      </tbody>
    </table>

    <!-- 5. Button -->
    <button class="my-button" id="myBtn">Click Me</button>

    <!-- 6. Grid Section -->
    <!-- Desktop: 4 items per row | Mobile: 2 items per row -->
    <section class="grid-section">
      <div class="grid-item">1</div>
      <div class="grid-item">2</div>
      <div class="grid-item">3</div>
      <div class="grid-item">4</div>
      <div class="grid-item">5</div>
      <div class="grid-item">6</div>
      <div class="grid-item">7</div>
      <div class="grid-item">8</div>
    </section>

  </main>

  <!-- Link to external JavaScript file -->
  <script src="script.js"></script>

</body>
</html>
